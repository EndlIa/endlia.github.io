{{ define "main" }}
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>

  <section class="post-list">
    {{ range .Pages }}
      <article class="post-item">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Summary }}<p>{{ . | plainify }}</p>{{ end }}
      </article>
    {{ end }}
  </section>
{{ end }}
